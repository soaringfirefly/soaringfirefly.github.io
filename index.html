<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmic Firefly Sky</title>
  <style>
    body {
      background: linear-gradient(270deg, #0b0c10, #1a1f40, #3b0a45, #7a1f5c, #1f4068);
      background-size: 1000% 1000%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      animation: skyShift 60s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes skyShift {
      0%   { background-position: 0% 50%; }
      25%  { background-position: 25% 50%; }
      50%  { background-position: 50% 50%; }
      75%  { background-position: 75% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* Star core */
    .star {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px 4px rgba(255,255,255,0.8);
      animation: twinkle 2s infinite ease-in-out,
                 rainbowGlow 6s linear infinite;
    }

    /* Glow halo */
    .star::before {
      content: "";
      position: absolute;
      top: -10px;
      left: -10px;
      width: 26px;
      height: 26px;
      background: radial-gradient(circle, currentColor 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.6;
    }

    /* Twinkle */
    @keyframes twinkle {
      0%, 100% { transform: scale(0.7); opacity: 0.5; }
      50%      { transform: scale(1.5); opacity: 1; }
    }

    /* Rainbow glow */
    @keyframes rainbowGlow {
      0%   { color: red;    background: red;    box-shadow: 0 0 12px red; }
      16%  { color: orange; background: orange; box-shadow: 0 0 12px orange; }
      33%  { color: yellow; background: yellow; box-shadow: 0 0 12px yellow; }
      50%  { color: green;  background: green;  box-shadow: 0 0 12px green; }
      66%  { color: blue;   background: blue;   box-shadow: 0 0 12px blue; }
      83%  { color: indigo; background: indigo; box-shadow: 0 0 12px indigo; }
      100% { color: violet; background: violet; box-shadow: 0 0 12px violet; }
    }

    /* Container for image + text */
    .cosmic-container {
      display: flex;
      align-items: center;
      gap: 30px; /* space between image and text */
      z-index: 10;
    }

    /* Glowing hover image */
    .glow-image {
      width: 250px;
      border-radius: 20px;
      transition: all 0.4s ease-in-out;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
    }

    .glow-image:hover {
      box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.9),
                  0 0 80px 30px rgba(0, 200, 255, 0.7),
                  0 0 120px 50px rgba(180, 0, 255, 0.6);
      transform: scale(1.1);
    }

    /* Pulsing cosmic text */
    .cosmic-text {
      max-width: 400px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      color: white;
      text-align: left;

      background: rgba(0, 0, 0, 0.4);
      padding: 15px 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);

      animation: cosmicPulse 4s ease-in-out infinite;
    }

    @keyframes cosmicPulse {
      0%, 100% {
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      }
      50% {
        background: rgba(0, 0, 0, 0.7);
        box-shadow: 0 0 40px rgba(0, 200, 255, 0.6),
                    0 0 80px rgba(180, 0, 255, 0.5);
      }
    }
  </style>
</head>
<body>
  <!-- Image + text side by side -->
  <div class="cosmic-container">
  <a href="about.html">
    <img src="https://i.imgur.com/9ncfLtp.jpeg" alt="Hover Glow Image" class="glow-image">
<a/>

    <p class="cosmic-text">
      This is my magical cosmic paragraph 🌌  
      It pulses with energy right beside the glowing image ✨
    </p>
  </div>

  <script>
    function createStar() {
      const star = document.createElement("div");
      star.classList.add("star");

      // random placement
      star.style.top = `${Math.random() * window.innerHeight}px`;
      star.style.left = `${Math.random() * window.innerWidth}px`;

      document.body.appendChild(star);

      setTimeout(() => star.remove(), 20000); // remove after 20s
    }

    setInterval(createStar, 800); // new star every 0.8s
  </script>
</body>
</html>
